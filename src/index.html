<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lime teste</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body class="min-h-screen overflow-x-hidden grid grid-cols-12">
    <app-cart></app-cart>
    <app-mobile-menu></app-mobile-menu>
    
    <div class="navbar fixed top-0 left-0 w-full max-w-full z-[60] pt-6">
      <div class="w-full max-w-[1400px] mx-auto px-6 lg:px-20 xl:px-24">
        <app-topbar></app-topbar>
        <app-header></app-header>
      </div>
    </div>

    <section class="hero col-span-12 flex flex-col justify-between">
      <div
        class="flex-1 w-full max-w-[1400px] mx-auto px-6 lg:px-20 xl:px-24 grid grid-cols-12 gap-10 lg:gap-8 items-center pb-16 lg:pb-20 pt-[190px] md:pt-[210px] lg:pt-[120px]"
      >
        <div
          class="col-span-12 lg:col-span-6 flex w-full max-w-[320px] mx-auto lg:max-w-none flex-col items-center justify-center font-geist order-first lg:order-last lg:pt-10"
        >
          <span
            class="uppercase tracking-[0.45em] text-[12px] text-zinc-200 mb-2 font-light"
            >COLLECTION</span
          >
          <h1
            class="text-[2.7rem] sm:text-[3.2rem] md:text-6xl lg:text-[4.5rem] font-light text-white tracking-[0.02em] mb-6 text-center leading-none"
          >
            WINTER 24
          </h1>
          <div class="w-[1px] h-5 bg-[#E7D158] mb-6"></div>
          <a
            href="#"
            class="inline-flex border border-[#E7D158] text-[#E7D158] rounded-full px-8 py-2 text-[14px] md:text-[15px] font-light hover:bg-[#E7D158] hover:text-black transition-colors"
          >
            Shop now!
          </a>
        </div>

        <div
          class="hidden lg:col-span-6 lg:flex justify-center items-center w-full lg:order-first"
        >
          <product-cardheader></product-cardheader>
        </div>
      </div>
    </section>

    <section
      class="col-span-12 bg-[#0b0b0d] px-6 py-10 md:px-8 md:py-12 lg:hidden"
    >
      <div class="mx-auto flex w-full max-w-[1400px] justify-center">
        <product-cardheader></product-cardheader>
      </div>
    </section>
    <div class="col-span-12">
      <info-section></info-section>
    </div>

    <div class="col-span-12">
      <grid-home></grid-home>
    </div>

    <div class="col-span-12">
      <product-showcase></product-showcase>
    </div>
    <div class="col-span-12">
      <product-editorial-showcase></product-editorial-showcase>
    </div>

    <div class="col-span-12">
      <app-newsletter></app-newsletter>
    </div>

  </body>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <script src="./js/cart.js"></script>
  <script src="./js/index.js"></script>

  <script src="./components/layout/app-topbar.js" defer></script>
  <script src="./components/layout/app-header.js" defer></script>
  <script src="./components/layout/app-cart.js" defer></script>
  <script src="./components/layout/app-mobile-menu.js" defer></script>
  <script src="./components/product/product-card.js" defer></script>
  <script src="./components/product/product-cardheader.js" defer></script>
  <script src="./components/product/product-editorial-showcase.js" defer></script>
  <script src="./components/product/product-showcase.js" defer></script>
  <script src="./components/grid-home.js" defer></script>
  <script src="./components/layout/app-info-section.js" defer></script>
  <script src="./components/layout/app-newsletter.js" defer></script>
</html>
